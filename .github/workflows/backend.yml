name: Backend
on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
defaults:
  run:
    working-directory: backend
jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Verify
        run: mvn verify
